<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interruptor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      transition: background 0.5s ease;
      user-select: none;
    }

    body.on {
      background: #f5f0c8;
    }

    .switch-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .switch {
      width: 120px;
      height: 200px;
      background: #2a2a3e;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: all 0.4s ease;
      border: 2px solid #3a3a5e;
    }

    body.on .switch {
      background: #e8e0b0;
      border-color: #d4c88a;
      box-shadow: 0 8px 30px rgba(180, 160, 60, 0.3);
    }

    .switch-lever {
      width: 60px;
      height: 100px;
      background: #555;
      border-radius: 8px;
      position: relative;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    body.on .switch-lever {
      background: #b8860b;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2), 0 0 15px rgba(184, 134, 11, 0.4);
    }

    .switch-lever::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      background: #777;
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    body.on .switch-lever::before {
      background: #fff7a1;
      box-shadow: 0 0 10px #fff7a1;
    }

    .switch-lever::after {
      content: "";
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 15px;
      background: #444;
      border-radius: 0 0 2px 2px;
    }

    .switch.on .switch-lever {
      transform: translateY(-20px);
    }

    .switch-plate {
      width: 80px;
      height: 10px;
      background: #333;
      border-radius: 2px;
      margin-top: 5px;
    }

    .label {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
      color: #555;
      transition: color 0.4s ease;
      letter-spacing: 2px;
    }

    body.on .label {
      color: #b8860b;
    }

    .hint {
      margin-top: 30px;
      color: #666;
      font-size: 14px;
      transition: color 0.4s ease;
    }

    body.on .hint {
      color: #999;
    }

    kbd {
      background: #333;
      color: #fff;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 13px;
      border: 1px solid #555;
    }

    body.on kbd {
      background: #ddd;
      color: #333;
      border-color: #bbb;
    }

    .light {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255, 247, 161, 0.4) 0%, transparent 70%);
    }

    body.on .light {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="light"></div>

  <div class="switch-container">
    <div class="switch" id="switch">
      <div class="switch-lever"></div>
    </div>
    <div class="switch-plate"></div>
  </div>

  <div class="label" id="label">DESLIGADO</div>
  <div class="hint" id="hint">Pressione <kbd>Espaco</kbd> ou toque para ligar</div>

  <script>
    let on = false;
    const switchEl = document.getElementById("switch");

    function toggle() {
      on = !on;
      document.body.classList.toggle("on", on);
      switchEl.classList.toggle("on", on);
      document.getElementById("label").textContent = on ? "LIGADO" : "DESLIGADO";
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        toggle();
      }
    });

    switchEl.addEventListener("click", toggle);

    if ("ontouchstart" in window) {
      document.getElementById("hint").textContent = "Toque no interruptor para ligar/desligar";
    }
  </script>
</body>
</html>
