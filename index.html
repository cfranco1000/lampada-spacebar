<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Lampada</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      background: #0a0a14;
      font-family: Arial, sans-serif;
      transition: background 0.6s ease;
      user-select: none;
      cursor: pointer;
      padding-top: 0;
    }

    body.on {
      background: #1a1a20;
    }

    /* Fio */
    .fio {
      width: 2px;
      height: 60px;
      background: #333;
    }

    /* Lampada */
    .lampada {
      position: relative;
      width: 200px;
      height: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .bulbo {
      width: 180px;
      height: 200px;
      background: #2a2a35;
      border-radius: 50% 50% 35% 35%;
      transition: all 0.4s ease;
      position: relative;
      z-index: 2;
    }

    body.on .bulbo {
      background: #fff7a1;
      box-shadow:
        0 0 100px 50px rgba(255, 247, 161, 0.5),
        0 0 200px 100px rgba(255, 247, 161, 0.2),
        inset 0 -20px 40px rgba(255, 200, 50, 0.3);
    }

    .base-lamp {
      width: 90px;
      height: 28px;
      background: #444;
      border-radius: 0 0 10px 10px;
      margin-top: -8px;
      position: relative;
      z-index: 2;
    }

    .rosca {
      width: 55px;
      height: 18px;
      background: #3a3a3a;
      border-radius: 0 0 6px 6px;
      margin-top: -3px;
      position: relative;
      z-index: 2;
    }

    /* Brilho */
    .glow {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255, 247, 161, 0.4) 0%, transparent 70%);
      z-index: 1;
    }

    body.on .glow {
      opacity: 1;
    }

    .hint {
      position: fixed;
      bottom: 40px;
      color: #333;
      font-size: 14px;
      transition: color 0.5s ease;
      pointer-events: none;
      z-index: 10;
    }

    body.on .hint {
      color: #555;
    }
  </style>
</head>
<body>
  <div class="fio"></div>
  <div class="lampada">
    <div class="glow"></div>
    <div class="bulbo"></div>
    <div class="base-lamp"></div>
    <div class="rosca"></div>
  </div>

  <div class="hint" id="hint">Toque em qualquer lugar</div>

  <script>
    let on = false;

    function toggle() {
      on = !on;
      document.body.classList.toggle("on", on);
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        toggle();
      }
    });

    document.body.addEventListener("click", toggle);
    document.body.addEventListener("touchstart", (e) => {
      e.preventDefault();
      toggle();
    }, { passive: false });
  </script>
</body>
</html>
